name = "flip-api"
main = "src/index.ts"
compatibility_date = "2026-05-14"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "flip-db"
database_id = "9bdbc913-45d4-4b0b-afb0-1aa177cdc23a"

[[kv_namespaces]]
binding = "KV"
id = "6f4e28e8f4db40608399ac840d58e2ff"

[[queues.producers]]
binding = "PARSE_QUEUE"
queue = "flip-parse-queue"

[[queues.producers]]
binding = "COMPARE_QUEUE"
queue = "flip-compare-queue"

[[queues.producers]]
binding = "NOTIFY_QUEUE"
queue = "flip-notify-queue"

[[queues.consumers]]
queue = "flip-parse-queue"
max_batch_size = 1
max_concurrency = 3
max_retries = 3
retry_delay = 30
dead_letter_queue = "flip-parse-dlq"

[[queues.consumers]]
queue = "flip-compare-queue"
max_batch_size = 1
max_concurrency = 2

[[queues.consumers]]
queue = "flip-notify-queue"
max_batch_size = 1
max_concurrency = 5

[[r2_buckets]]
binding = "BILLS"
bucket_name = "flip-bills"

[triggers]
crons = ["0 3 * * *", "0 6 * * *", "0 8 * * *", "0 10 * * *", "0 14 * * *"]

[vars]
ENVIRONMENT = "development"
SERVICE_VERSION = "0.1.0"
# Bills with parser confidence below this are routed to manual review (#41).
F1_HINT_CONFIDENCE_THRESHOLD = "0.85"
# Issue #64: EIEP14A ingestion worker. INERT until the EA feed lands in
# October — flip to "true" to arm the 0 3 * * * cron. Defaults false.
EIF_EIEP14A_ENABLED = "false"
# Issue #66: Temporary Powerswitch scraper bridge (TEMPORARY — sunset when #64
# EIEP14A feed covers retailers). INERT by default; fetching public plan-listing
# pages only, zero PII. See docs/AI_RULES.md override block + module header.
POWERSWITCH_SCRAPER_ENABLED = "false"

# Issue #242 — live test deployment flags (Compliance Gate 2: Consumer NZ
# sign-off recorded 2026-07-16 in docs/POWERSWITCH_COMPLIANCE.md, PR #244).
# POWERSWITCH_LIVE arms the per-user bridge + daily drift canary (real calls to
# powerswitch.co.nz). FLOW_TEST_MODE bypasses the notify threshold/cooldown so a
# test run always fires a WhatsApp send when a trace is active. See
# docs/TESTING_RUN.md. Hard rules (ICP never submitted, budget, etiquette,
# canary) unchanged.
POWERSWITCH_LIVE = "true"
FLOW_TEST_MODE = "true"

# Durable Object used by src/middleware/rateLimit.ts for atomic per-key rate
# limiting.  One DO instance per rate-limit key serialises read-modify-write
# cycles that would race under KV.
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# First DO migration — must be applied before wrangler deploy.
[[migrations]]
tag = "v1"
new_classes = ["RateLimiter"]
