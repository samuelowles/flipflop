name: CI

on:
  pull_request:

jobs:
  ci:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — wrangler ≥4 (dev/deploy/dry-run) requires Node ≥22.
          node-version: "22"
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        # TODO(phase-2): re-enable --coverage once @cloudflare/vitest-pool-workers
        # supports @vitest/coverage-v8 in workerd (tracked in #135).
        run: npm test

      # Issue #242 — deploy dry-run as a CI gate so binding/entrypoint breakage
      # (e.g. a Durable Object declared in wrangler.toml but not exported from
      # src/index.ts — the RateLimiter blocker that left master undeployable)
      # can never merge silently again. Bundles the Worker without deploying.
      - name: Wrangler deploy dry-run (binding/entrypoint guard)
        run: npx wrangler deploy --dry-run --outdir /tmp/dryrun

      # Coverage upload is disabled until --coverage is re-enabled above.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: workers/coverage/
          if-no-files-found: ignore

  python-eval:
    name: parser pytest + eval harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            python/requirements.txt
            python/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          pip install -r python/requirements.txt
          pip install -r python/requirements-dev.txt

      - name: Run parser unit tests (pytest)
        run: pytest python/ -q

      - name: Run parse-eval harness (golden fixtures)
        # Runs every committed PDF in python/fixtures/ through the parser and
        # compares to its sibling .expected.json. Prints a per-retailer pass
        # rate + average confidence table. Exits non-zero on any mismatch
        # (fails the PR). See scripts/eval_parser.py for the comparison contract.
        run: python scripts/eval_parser.py

