name: Deploy

# Deploy-on-commit: every push to master that passes the same gates as CI is
# deployed to Cloudflare. Requires ONE repo secret:
#   CLOUDFLARE_API_TOKEN — create in the Cloudflare dashboard (My Profile →
#   API Tokens → "Edit Cloudflare Workers" template, scoped to this account),
#   then: gh secret set CLOUDFLARE_API_TOKEN
# Worker secrets (GMAIL_*, SENT_*, ENCRYPTION_KEY, …) live in Cloudflare
# (wrangler secret put) and are NOT touched by deploys.

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: gate + deploy flip-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # wrangler ≥4 requires Node ≥22
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Same gates as CI — squash-merges land on master without re-running the
      # PR workflow's checks against the merged tree, so gate here too.
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      - name: Deploy (wrangler)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers

      - name: Health check
        if: steps.deploy.outputs.deployment-url != ''
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.deployment-url }}/health")
          echo "GET /health -> $code"
          test "$code" = "200"
